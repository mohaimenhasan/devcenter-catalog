# This is an example workload.yaml file. It is used to configure a Dev Box's customizations.
$schema: "1.0"
name: "devbox-runner"
tasks:
  - name: powershell
    parameters:
      command: Invoke-WebRequest -Uri https://github.com/actions/runner/releases/download/v2.323.0/actions-runner-win-arm64-2.323.0.zip -OutFile 'C:\\actions-runner\\runner.zip'
    description: Execute a powershell command to download the runner using Invoke-WebRequest.
  - name: powershell
    parameters:
      command: Add-Type -AssemblyName System.IO.Compression.FileSystem ; [System.IO.Compression.ZipFile]::ExtractToDirectory('C:\\actions-runner\\runner.zip', '$PWD')
    description: Execute a powershell command to extract the installer using System.IO.Compression.
  - name: powershell
    parameters:
      command: ./config.sh --url https://github.com/mohaimenhasan/devbox-runner-demo --token <token>
      workingDirectory: C:\\actions-runner\\runner.zip
    description: Run the configuration script for the runner.
  - name: powershell
    parameters:
      command: ./run.sh
      workingDirectory: C:\\actions-runner\\runner.zip
    description: Execute a powershell command to start the runner in the working directory C:\\actions-runner\\runner.zip.