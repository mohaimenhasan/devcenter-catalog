# This is an example workload.yaml file. It is used to configure a Dev Box's customizations.
$schema: "1.0"
name: "devbox-runner"
tasks:
  - name: powershell
    parameters:
      command: Invoke-WebRequest -Uri 'https://github.com/actions/runner/releases' -OutFile 'C:\\actions-runner\\runner.zip'
      workingDirectory: C:\\actions-runner
    description: Execute a powershell command to download the runner from GitHub releases. The command will be executed in the 'C:\\actions-runner' working directory.
  - name: powershell
    parameters:
      command: Expand-Archive -Path 'C:\\actions-runner\\runner.zip' -DestinationPath 'C:\\actions-runner'; Start-Process powershell -ArgumentList '-NoExit', '-Command', 'Set-Location -Path C:\\actions-runner'
    description: Execute a powershell command to extract the runner and open a terminal in the directory C:\\actions-runner.
  - name: powershell
    parameters:
      command: ./config.sh --url https://github.com/mohaimenhasan/devbox-runner-demo --token <ADD TOKEN>
      workingDirectory: C:\\actions-runner
    description: Execute the powershell command './config.sh --url https://github.com/mohaimenhasan/devbox-runner-demo --token <ADD TOKEN>' in the working directory 'C:\\actions-runner'.
  - name: powershell
    parameters:
      command: ./run.sh
      workingDirectory: C:\\actions-runner
    description: Execute a powershell command to start the runner in the directory C:\\actions-runner.
